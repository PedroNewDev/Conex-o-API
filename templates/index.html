<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat com ChatGPT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      height: 90vh;
    }

    .header {
      background: #10a37f;
      color: white;
      padding: 18px 24px;
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 { font-size: 1.2rem; }
    .header span { font-size: 1.6rem; }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .mensagem {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
    }

    .mensagem.usuario {
      background: #10a37f;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    .mensagem.ia {
      background: #f0f2f5;
      color: #333;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .mensagem.erro {
      background: #ffe0e0;
      color: #c00;
      align-self: flex-start;
    }

    .info-tokens {
      font-size: 0.75rem;
      color: #999;
      margin-top: 4px;
      align-self: flex-start;
    }

    .loading {
      align-self: flex-start;
      color: #999;
      font-style: italic;
      font-size: 0.9rem;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #eee;
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      font-family: inherit;
    }

    #input:focus { border-color: #10a37f; }

    button {
      background: #10a37f;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #0d8a6a; }
    button:disabled { background: #aaa; cursor: default; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span>🤖</span>
      <h1>Chat com ChatGPT (OpenAI)</h1>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="mensagem ia">Olá! Como posso te ajudar hoje?</div>
    </div>

    <div class="input-area">
      <textarea id="input" rows="2" placeholder="Digite sua mensagem..."></textarea>
      <button id="btnEnviar" onclick="enviar()">Enviar</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const input = document.getElementById("input");
    const btn = document.getElementById("btnEnviar");

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        enviar();
      }
    });

    async function enviar() {
      const texto = input.value.trim();
      if (!texto) return;

      adicionarMensagem(texto, "usuario");
      input.value = "";
      btn.disabled = true;

      const loading = document.createElement("div");
      loading.className = "loading";
      loading.textContent = "Digitando...";
      chatBox.appendChild(loading);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mensagem: texto })
        });

        const data = await res.json();
        chatBox.removeChild(loading);

        if (data.erro) {
          adicionarMensagem("Erro: " + data.erro, "erro");
        } else {
          adicionarMensagem(data.resposta, "ia");
          const info = document.createElement("div");
          info.className = "info-tokens";
          info.textContent = `Modelo: ${data.modelo} | Tokens: ${data.tokens}`;
          chatBox.appendChild(info);
        }
      } catch (e) {
        chatBox.removeChild(loading);
        adicionarMensagem("Erro de conexão com o servidor.", "erro");
      }

      chatBox.scrollTop = chatBox.scrollHeight;
      btn.disabled = false;
      input.focus();
    }

    function adicionarMensagem(texto, tipo) {
      const div = document.createElement("div");
      div.className = `mensagem ${tipo}`;
      div.textContent = texto;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
